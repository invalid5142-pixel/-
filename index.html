<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карл Метрсон: Путь мести — Акт 1</title>
    <style>
        /* --- Базовые стили --- */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            color: #fff;
            font-family: 'Georgia', 'Times New Roman', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- Тонкая текстура на фоне --- */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(255,255,255,0.015) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(255,255,255,0.01) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* --- Контейнер страниц --- */
        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 900px;
            padding: 40px 20px 60px;
            position: relative;
            z-index: 1;
            opacity: 0;
            transform: translateY(12px);
        }

        .page.active {
            display: flex;
            animation: fadeSlideIn 0.45s ease forwards;
        }

        @keyframes fadeSlideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- Титульная страница --- */
        .title-page {
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .title-page h1 {
            font-size: clamp(1.6rem, 5vw, 2.8rem);
            font-weight: 400;
            letter-spacing: 0.04em;
            line-height: 1.35;
            margin-bottom: 12px;
            text-shadow: 0 0 40px rgba(255,255,255,0.06);
        }

        .title-page .subtitle {
            font-size: clamp(0.85rem, 2vw, 1.1rem);
            color: rgba(255,255,255,0.4);
            font-style: italic;
            margin-bottom: 56px;
            letter-spacing: 0.08em;
        }

        /* Декоративная линия */
        .divider {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            margin: 0 auto 48px;
        }

        /* --- Кнопки --- */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 36px;
            background: #444;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
            letter-spacing: 0.03em;
            user-select: none;
        }

        .btn:hover {
            background: #666;
            box-shadow: 0 4px 20px rgba(255,255,255,0.05);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn:focus-visible {
            outline: 2px solid rgba(255,255,255,0.4);
            outline-offset: 3px;
        }

        .btn-start {
            padding: 16px 48px;
            font-size: 1.1rem;
        }

        /* Стрелки в кнопках */
        .btn .arrow {
            display: inline-block;
            font-size: 0.8em;
            transition: transform 0.2s ease;
        }

        .btn:hover .arrow-left {
            transform: translateX(-3px);
        }

        .btn:hover .arrow-right {
            transform: translateX(3px);
        }

        /* --- Страница комикса --- */
        .comic-page {
            min-height: 100vh;
        }

        .comic-page .part-title {
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            color: rgba(255,255,255,0.5);
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 28px;
        }

        .comic-page .comic-img-wrapper {
            width: 100%;
            border-radius: 4px;
            overflow: hidden;
            box-shadow:
                0 2px 20px rgba(0,0,0,0.5),
                0 0 60px rgba(0,0,0,0.3);
            line-height: 0;
            margin-bottom: 40px;
        }

        .comic-page .comic-img-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* --- Навигация --- */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 16px;
        }

        .nav .btn {
            flex-shrink: 0;
        }

        .page-indicator {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 0.06em;
            white-space: nowrap;
        }

        /* --- Прогресс-бар --- */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 2px;
            background: rgba(255,255,255,0.2);
            transition: width 0.4s ease;
            z-index: 100;
        }

        /* --- Подсказка клавиатуры --- */
        .keyboard-hint {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: rgba(255,255,255,0.15);
            letter-spacing: 0.06em;
            z-index: 50;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .keyboard-hint.hidden {
            opacity: 0;
        }

        /* --- Адаптивность --- */
        @media (max-width: 600px) {
            .page {
                padding: 28px 16px 48px;
            }

            .btn {
                padding: 12px 24px;
                font-size: 0.9rem;
            }

            .btn-start {
                padding: 14px 36px;
                font-size: 1rem;
            }

            .comic-page .comic-img-wrapper {
                margin-bottom: 28px;
            }
        }

        /* --- Уменьшение анимаций для тех, кто предпочитает --- */
        @media (prefers-reduced-motion: reduce) {
            .page.active {
                animation: none;
                opacity: 1;
                transform: none;
            }

            .btn, .btn .arrow, .progress-bar {
                transition: none;
            }
        }
    </style>
</head>
<body>

    <!-- Прогресс-бар -->
    <div class="progress-bar" id="progressBar"></div>

    <!-- Титульная страница -->
    <div class="page title-page active" id="page-0">
        <h1>Карл Метрсон:<br>Путь мести</h1>
        <p class="subtitle">Акт 1</p>
        <div class="divider"></div>
        <button class="btn btn-start" onclick="goTo(1)" aria-label="Начать читать комикс">
            Начать читать
        </button>
    </div>

    <!-- Страницы комикса (генерируются через JS) -->
    <div id="comicPages"></div>

    <!-- Подсказка клавиатуры -->
    <div class="keyboard-hint" id="kbHint">&larr; &rarr; для навигации</div>

    <script>
        /* --- Конфигурация --- */
        const TOTAL_PAGES = 7;
        let current = 0; // 0 = титульная, 1–7 = страницы комикса

        /* --- Генерация страниц комикса --- */
        const container = document.getElementById('comicPages');

        for (let i = 1; i <= TOTAL_PAGES; i++) {
            const page = document.createElement('div');
            page.className = 'page comic-page';
            page.id = 'page-' + i;

            page.innerHTML = `
                <h2 class="part-title">Часть ${i}</h2>
                <div class="comic-img-wrapper">
                    <img src="${i}.png" alt="Часть ${i} — Карл Метрсон: Путь мести" loading="lazy">
                </div>
                <nav class="nav" aria-label="Навигация по страницам комикса">
                    <button class="btn" onclick="goTo(${i - 1})" aria-label="Назад">
                        <span class="arrow arrow-left">&larr;</span> Назад
                    </button>
                    <span class="page-indicator">${i} / ${TOTAL_PAGES}</span>
                    <button class="btn" onclick="goTo(${i + 1})" aria-label="Вперёд">
                        Вперёд <span class="arrow arrow-right">&rarr;</span>
                    </button>
                </nav>
            `;

            container.appendChild(page);
        }

        /* --- Навигация --- */
        function goTo(index) {
            /* Границы: нельзя уйти за 0 или за TOTAL_PAGES */
            if (index < 0 || index > TOTAL_PAGES) return;

            /* Скрыть текущую */
            const currentEl = document.getElementById('page-' + current);
            if (currentEl) {
                currentEl.classList.remove('active');
                currentEl.style.display = 'none';
            }

            current = index;

            /* Показать новую */
            const nextEl = document.getElementById('page-' + current);
            if (nextEl) {
                /* Сброс анимации: убираем класс, форсируем reflow, добавляем обратно */
                nextEl.style.display = 'flex';
                nextEl.classList.remove('active');
                void nextEl.offsetWidth; // reflow
                nextEl.classList.add('active');
            }

            /* Обновить прогресс-бар */
            updateProgress();

            /* Подсказка клавиатуры: показать на страницах комикса, скрыть на титульной */
            const hint = document.getElementById('kbHint');
            hint.classList.toggle('hidden', current === 0 || current === TOTAL_PAGES);

            /* Прокрутить наверх */
            window.scrollTo({ top: 0, behavior: 'instant' });
        }

        /* --- Прогресс-бар --- */
        function updateProgress() {
            const bar = document.getElementById('progressBar');
            if (current === 0) {
                bar.style.width = '0%';
            } else {
                const pct = (current / TOTAL_PAGES) * 100;
                bar.style.width = pct + '%';
            }
        }

        /* --- Клавиатурная навигация --- */
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goTo(current + 1);
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goTo(current - 1);
            }
        });

        /* --- Свайп на мобильных --- */
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', function(e) {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        document.addEventListener('touchend', function(e) {
            const dx = e.changedTouches[0].screenX - touchStartX;
            const dy = e.changedTouches[0].screenY - touchStartY;

            /* Только горизонтальные свайпы, игнорируем короткие и диагональные */
            if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
                if (dx < 0) {
                    goTo(current + 1); // свайп влево — вперёд
                } else {
                    goTo(current - 1); // свайп вправо — назад
                }
            }
        }, { passive: true });

        /* --- Инициализация --- */
        updateProgress();
        document.getElementById('kbHint').classList.add('hidden');
    </script>
</body>
</html>
